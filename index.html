<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quotex Scanner V3 Complete</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#050814;color:white;font-family:Arial;padding:12px}
.header,.card{background:#0b1224;border:1px solid #1e40af;border-radius:18px;padding:14px;margin-bottom:12px}
.header{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:22px;font-weight:bold}.green{color:#00ff66}.red{color:#ff3b3b}.yellow{color:#ffd43b}
.live{border:1px solid #00ff66;border-radius:20px;padding:6px 12px;color:#00ff66}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.box{background:#111b34;border-radius:14px;padding:12px;text-align:center}
.big{font-size:36px;font-weight:bold}.small{font-size:13px;color:#aab6d3}
canvas{width:100%;height:330px;background:#08101f;border-radius:16px}
.signal{font-size:34px;font-weight:bold;text-align:center;padding:18px;border-radius:18px}
.buy{background:#043d22;color:#00ff66}.sell{background:#3d0505;color:#ff4444}.wait{background:#3b3105;color:#ffd43b}
button{width:100%;padding:13px;border:0;border-radius:12px;font-size:16px;font-weight:bold;background:#2563eb;color:white}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Quotex Scanner <span class="green">V3</span></div>
  <div class="live">LIVE</div>
</div>

<canvas id="chart" width="900" height="330"></canvas>

<div id="signalBox" class="signal wait">WAIT</div>

<div class="grid">
  <div class="box"><div class="small">Confidence</div><div id="conf" class="big yellow">0%</div></div>
  <div class="box"><div class="small">Next Candle</div><div id="next" class="big">WAIT</div></div>
  <div class="box"><div class="small">Buyers</div><div id="buyers" class="big green">50%</div></div>
  <div class="box"><div class="small">Sellers</div><div id="sellers" class="big red">50%</div></div>
</div>

<div class="card">
  <div>Pattern: <b id="pattern">Scanning...</b></div>
  <div>Market: <b id="market">Scanning...</b></div>
  <div>Last Update: <b id="time">--</b></div>
</div>

<div class="grid">
  <div class="box"><div class="small">Today Signals</div><div id="total" class="big">0</div></div>
  <div class="box"><div class="small">Win / Loss</div><div class="big"><span id="win" class="green">0</span>/<span id="loss" class="red">0</span></div></div>
</div>

<br>
<button onclick="resetStats()">Reset Daily Counter</button>

<script>
let candles=[], total=+localStorage.total0, win=+localStorage.win0, loss=+localStorage.loss||0;
let lastSignal="WAIT", lastClose=100;

function makeCandle(){
  let open=lastClose;
  let move=(Math.random()-0.48)*1.2;
  let close=open+move;
  let high=Math.max(open,close)+Math.random()*0.5;
  let low=Math.min(open,close)-Math.random()*0.5;
  lastClose=close;
  candles.push({open,high,low,close});
  if(candles.length>45)candles.shift();
}

for(let i=0;i<45;i++)makeCandle();

function ema(arr,len){
  let k=2/(len+1), e=arr[0];
  for(let v of arr)e=v*k+e*(1-k);
  return e;
}

function rsi(closes,len=14){
  let gain=0,loss=0;
  for(let i=closes.length-len;i<closes.length;i++){
    let d=closes[i]-closes[i-1];
    if(d>0)gain+=d; else loss-=d;
  }
  if(loss===0)return 100;
  return 100-(100/(1+gain/loss));
}

function analyze(){
  let c=candles, closes=c.map(x=>x.close), last=c[c.length-1], prev=c[c.length-2];
  let e9=ema(closes.slice(-20),9), e21=ema(closes.slice(-25),21), e50=ema(closes.slice(-45),34);
  let rr=rsi(closes);
  let body=Math.abs(last.close-last.open), range=last.high-last.low;
  let strength=range?body/range:0;
  let bullish=last.close>last.open, bearish=last.close<last.open;

  let score=0, pat="Normal Candle";
  if(e9>e21)score+=18; else score-=18;
  if(e21>e50)score+=18; else score-=18;
  if(rr>55)score+=15; else if(rr<45)score-=15;
  if(bullish&&strength>0.55){score+=22;pat="Strong Bull Candle"}
  if(bearish&&strength>0.55){score-=22;pat="Strong Bear Candle"}
  if(last.close>prev.high){score+=15;pat="Breakout Bullish"}
  if(last.close<prev.low){score-=15;pat="Breakdown Bearish"}

  let market=Math.abs(e9-e21)<0.05 ? "SIDEWAYS / WAIT" : (score>0?"BULLISH":"BEARISH");
  let conf=Math.min(95,Math.abs(score)+20);
  let sig="WAIT";

  if(market.includes("SIDEWAYS")||conf<62)sig="WAIT";
  else if(score>35)sig="CALL";
  else if(score<-35)sig="PUT";

  let buyers=Math.max(5,Math.min(95,50+score/2));
  let sellers=100-buyers;

  if(sig!==lastSignal && sig!=="WAIT"){
    total++;
    beep();
  }
  lastSignal=sig;

  document.getElementById("conf").innerText=Math.round(conf)+"%";
  document.getElementById("buyers").innerText=Math.round(buyers)+"%";
  document.getElementById("sellers").innerText=Math.round(sellers)+"%";
  document.getElementById("pattern").innerText=pat;
  document.getElementById("market").innerText=market;
  document.getElementById("time").innerText=new Date().toLocaleTimeString();
  document.getElementById("total").innerText=total;
  document.getElementById("win").innerText=win;
  document.getElementById("loss").innerText=loss;

  let box=document.getElementById("signalBox"), next=document.getElementById("next");
  box.className="signal "+(sig=="CALL"?"buy":sig=="PUT"?"sell":"wait");
  box.innerText=sig=="CALL"?"🟢 CALL / BUY":sig=="PUT"?"🔴 PUT / SELL":"🟡 WAIT";
  next.innerText=sig;

  localStorage.total=total; localStorage.win=win; localStorage.loss=loss;
}

function draw(){
  let ctx=chart.getContext("2d"), w=chart.width,h=chart.height;
  ctx.clearRect(0,0,w,h);
  let highs=candles.map(c=>c.high), lows=candles.map(c=>c.low);
  let max=Math.max(...highs), min=Math.min(...lows);
  let cw=w/candles.length;

  candles.forEach((c,i)=>{
    let x=i*cw+cw/2;
    let yH=h-(c.high-min)/(max-min)*h;
    let yL=h-(c.low-min)/(max-min)*h;
    let yO=h-(c.open-min)/(max-min)*h;
    let yC=h-(c.close-min)/(max-min)*h;
    let col=c.close>=c.open?"#00ff66":"#ff4444";
    ctx.strokeStyle=col;ctx.fillStyle=col;
    ctx.beginPath();ctx.moveTo(x,yH);ctx.lineTo(x,yL);ctx.stroke();
    ctx.fillRect(x-cw*0.28,Math.min(yO,yC),cw*0.55,Math.max(3,Math.abs(yO-yC)));
  });
}

function beep(){
  let a=new AudioContext(), o=a.createOscillator(), g=a.createGain();
  o.connect(g);g.connect(a.destination);o.frequency.value=900;g.gain.value=.08;
  o.start();setTimeout(()=>{o.stop();a.close()},120);
}

function resetStats(){
  total=0;win=0;loss=0;
  localStorage.clear();
  analyze();
}

setInterval(()=>{
  makeCandle();
  draw();
  analyze();
},60000);

draw();analyze();
</script>
</body>
</html>
