<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAHMAN OTC BEAST SCANNER</title>
<style>
body{margin:0;background:#05070f;color:#e8ecff;font-family:Arial,sans-serif}
.container{max-width:1100px;margin:auto;padding:15px}
.header{background:#0b0f1e;border:1px solid #1a2040;border-radius:15px;padding:18px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
h1{font-size:20px;margin:0;color:#00ff88}
.sub{font-size:12px;color:#7d86b0;margin-top:4px}
.badge{background:#002b1a;color:#00ff88;padding:7px 12px;border-radius:20px;font-size:12px;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.card{background:#0f1428;border:1px solid #1a2040;border-radius:15px;padding:15px}
.pair{font-size:20px;font-weight:bold}
.price{font-size:22px;margin-top:8px;font-family:monospace}
.signal{margin-top:12px;padding:12px;border-radius:12px;font-size:22px;font-weight:bold;text-align:center}
.call{background:rgba(0,255,136,.12);color:#00ff88;border:1px solid #00ff88}
.put{background:rgba(255,45,92,.12);color:#ff2d5c;border:1px solid #ff2d5c}
.wait{background:rgba(255,255,255,.08);color:#ffd166;border:1px solid #ffd166}
.ind{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:12px}
.ind div{background:#080c18;border:1px solid #1a2040;border-radius:8px;padding:7px;font-size:11px;text-align:center}
.timer{font-size:38px;font-weight:bold;color:#ffd166;text-align:center;margin:15px 0;font-family:monospace}
button{background:#4a7dff;color:white;border:0;border-radius:10px;padding:11px 18px;font-weight:bold}
.note{font-size:12px;color:#8b95c9;margin-top:14px;line-height:1.5}
.status{font-size:12px;color:#7d86b0;margin-top:8px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>⚡ RAHMAN OTC BEAST SCANNER</h1>
      <div class="sub">OTC Style Next Candle Signal • M1 • 15s Before Close</div>
    </div>
    <div class="badge">LIVE SCANNER</div>
  </div>

  <div class="timer" id="timer">--</div>
  <button onclick="scanNow()">SCAN NOW</button>
  <div class="status" id="status">Waiting...</div>

  <div class="grid" id="cards"></div>

  <div class="note">
    ⚠️ Note: Quotex OTC exact broker data API இல்லை. இது Twelve Data real forex feed வைத்து OTC-style signal தரும். Demo-வில் test பண்ணிட்டு தான் real trade போ.
  </div>
</div>

<script>
const API_KEY = "f2eb74a168e84757b3bbbc8851569d6b";

const PAIRS = [
  { name:"EUR/USD OTC", symbol:"EUR/USD" },
  { name:"GBP/USD OTC", symbol:"GBP/USD" },
  { name:"USD/JPY OTC", symbol:"USD/JPY" },
  { name:"AUD/USD OTC", symbol:"AUD/USD" },
  { name:"USD/CHF OTC", symbol:"USD/CHF" }
];

let lastSignalMinute = -1;

function ema(values, period){
  if(values.length < period) return values[values.length-1];
  let k = 2 / (period + 1);
  let e = values.slice(0,period).reduce((a,b)=>a+b,0) / period;
  for(let i=period;i<values.length;i++) e = values[i]*k + e*(1-k);
  return e;
}

function rsi(closes, period=14){
  let gains=0, losses=0;
  for(let i=closes.length-period;i<closes.length;i++){
    let d = closes[i] - closes[i-1];
    if(d > 0) gains += d;
    else losses -= d;
  }
  let rs = gains / (losses || 0.00001);
  return 100 - (100 / (1 + rs));
}

function bollinger(closes){
  let p = closes.slice(-20);
  let mid = p.reduce((a,b)=>a+b,0)/p.length;
  let variance = p.reduce((a,b)=>a+Math.pow(b-mid,2),0)/p.length;
  let sd = Math.sqrt(variance);
  return { upper: mid + 2*sd, mid, lower: mid - 2*sd };
}

function stochastic(candles){
  let p = candles.slice(-14);
  let high = Math.max(...p.map(c=>c.high));
  let low = Math.min(...p.map(c=>c.low));
  let close = candles[candles.length-1].close;
  return ((close-low)/(high-low || 0.00001))*100;
}

function adxSideways(candles){
  let recent = candles.slice(-10);
  let range = recent.reduce((a,c)=>a+(c.high-c.low),0)/recent.length;
  let price = recent[recent.length-1].close;
  return range / price < 0.00035;
}
  function macdBull(closes){
  return ema(closes,12) > ema(closes,26);
}

function analyze(candles){
  let closes = candles.map(c=>c.close);
  let last = candles[candles.length-1];

  let ema9 = ema(closes,9);
  let ema21 = ema(closes,21);
  let ema50 = ema(closes,50);
  let rr = rsi(closes);
  let bb = bollinger(closes);
  let st = stochastic(candles);
  let macd = macdBull(closes);
  let sideways = adxSideways(candles);

  let call = 0, put = 0;

  if(ema9 > ema21 && ema21 > ema50) call += 2;
  if(ema9 < ema21 && ema21 < ema50) put += 2;

  if(rr > 52 && rr < 70) call++;
  if(rr < 48 && rr > 30) put++;

  if(macd) call++; else put++;

  if(last.close > bb.mid) call++;
  if(last.close < bb.mid) put++;

  if(st > 55 && st < 85) call++;
  if(st < 45 && st > 15) put++;

  if(last.close > last.open) call++;
  if(last.close < last.open) put++;

  let signal = "WAIT";
  if(!sideways){
    if(call >= 5 && call > put) signal = "CALL";
    else if(put >= 5 && put > call) signal = "PUT";
  }

  return {
    signal,
    price:last.close,
    rsi:rr.toFixed(1),
    stoch:st.toFixed(1),
    ema: ema9 > ema21 ? "UP" : "DOWN",
    macd: macd ? "UP" : "DOWN",
    bb: last.close > bb.mid ? "UP" : "DOWN",
    score: signal==="CALL" ? call : signal==="PUT" ? put : Math.max(call,put),
    sideways
  };
}

async function fetchCandles(symbol){
  let url = https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(symbol)}&interval=1min&outputsize=60&apikey=${API_KEY};
  let res = await fetch(url);
  let json = await res.json();
  if(!json.values) throw new Error(json.message || "No data");
  return json.values.reverse().map(v=>({
    open:parseFloat(v.open),
    high:parseFloat(v.high),
    low:parseFloat(v.low),
    close:parseFloat(v.close)
  }));
}

async function scanNow(){
  document.getElementById("status").innerText = "Scanning market...";
  let html = "";

  for(let p of PAIRS){
    try{
      let candles = await fetchCandles(p.symbol);
      let a = analyze(candles);
      let cls = a.signal==="CALL" ? "call" : a.signal==="PUT" ? "put" : "wait";
      let icon = a.signal==="CALL" ? "🟢 CALL" : a.signal==="PUT" ? "🔴 PUT" : "⚪ WAIT";

      html += 
      <div class="card">
        <div class="pair">${p.name}</div>
        <div class="price">${a.price}</div>
        <div class="signal ${cls}">${icon}</div>
        <div class="ind">
          <div>EMA<br>${a.ema}</div>
          <div>RSI<br>${a.rsi}</div>
          <div>MACD<br>${a.macd}</div>
          <div>BB<br>${a.bb}</div>
          <div>STOCH<br>${a.stoch}</div>
          <div>SCORE<br>${a.score}/6</div>
        </div>
        <div class="status">${a.sideways ? "Sideways market: WAIT filter active" : "Trend market active"}</div>
      </div>;
    }catch(e){
      html += <div class="card"><div class="pair">${p.name}</div><div class="signal wait">DATA ERROR</div></div>;
    }
    await new Promise(r=>setTimeout(r,900));
  }

  document.getElementById("cards").innerHTML = html;
  document.getElementById("status").innerText = "Last scan: " + new Date().toLocaleTimeString();
}

setInterval(()=>{
  let now = new Date();
  let sec = now.getSeconds();
  let remain = 60 - sec;
  document.getElementById("timer").innerText = remain + "s";

  if(remain <= 15 && lastSignalMinute !== now.getMinutes()){
    lastSignalMinute = now.getMinutes();
    scanNow();
  }
},1000);

scanNow();
</script>
</body>
</html>
