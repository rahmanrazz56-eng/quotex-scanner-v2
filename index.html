
<div class="footergrid">
  <div class="card">
    <div class="small">SIGNAL SUMMARY</div>
    <h2 id="summary">-- / 6</h2>
  </div>
  <div class="card">
    <div class="small">SERVER STATUS</div>
    <h3 class="buy">Connected</h3>
  </div>
  <div class="card">
    <div class="small">LAST UPDATE</div>
    <h3 id="update">--</h3>
  </div>
</div>

<script>
const API_KEY = "c48c777c933744a8a07e31491abffec3";

function ema(values, period){
  let k = 2 / (period + 1);
  let e = values[0];
  for(let i=1;i<values.length;i++) e = values[i]*k + e*(1-k);
  return e;
}

function rsi(values, period){
  let gains=0, losses=0;
  for(let i=values.length-period;i<values.length;i++){
    let diff = values[i] - values[i-1];
    if(diff>=0) gains += diff;
    else losses -= diff;
  }
  if(losses===0) return 100;
  let rs = gains/losses;
  return 100 - (100/(1+rs));
}

function macd(values){
  return ema(values.slice(-40),12) - ema(values.slice(-40),26);
}

function stochastic(candles){
  let last = candles[candles.length-1];
  let recent = candles.slice(-14);
  let low = Math.min(...recent.map(c=>parseFloat(c.low)));
  let high = Math.max(...recent.map(c=>parseFloat(c.high)));
  return ((parseFloat(last.close)-low)/(high-low))*100;
}

function williams(candles){
  let last = candles[candles.length-1];
  let recent = candles.slice(-14);
  let low = Math.min(...recent.map(c=>parseFloat(c.low)));
  let high = Math.max(...recent.map(c=>parseFloat(c.high)));
  return ((high-parseFloat(last.close))/(high-low))*-100;
}

function drawChart(closes){
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);
  let min=Math.min(...closes), max=Math.max(...closes);
  ctx.beginPath();
  closes.forEach((v,i)=>{
    let x=i*(c.width/(closes.length-1));
    let y=c.height-((v-min)/(max-min))*c.height;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.strokeStyle="#00ff66";
  ctx.lineWidth=3;
  ctx.stroke();
}

async function scan(){
  document.getElementById("signal").innerHTML="SCANNING...";
  try{
    let url="https://api.twelvedata.com/time_series?symbol=EUR/USD&interval=1min&outputsize=80&apikey="+API_KEY;
    let res=await fetch(url);
    let data=await res.json();

    if(data.status==="error" || !data.values){
      document.getElementById("signal").innerHTML="API ERROR";
      return;
    }

    let candles=data.values.reverse();
    let closes=candles.map(c=>parseFloat(c.close));
    let lastC=candles[candles.length-1];

    let last=closes[closes.length-1];
    let ema9=ema(closes.slice(-30),9);
    let ema21=ema(closes.slice(-40),21);
    let ema50=ema(closes.slice(-60),50);
    let rr=rsi(closes,14);
    let mm=macd(closes);
    let st=stochastic(candles);
    let wr=williams(candles);

    let open=parseFloat(lastC.open);
    let close=parseFloat(lastC.close);
    let high=parseFloat(lastC.high);
    let low=parseFloat(lastC.low);

    let body=Math.abs(close-open);
    let range=high-low;
    let candlePower=range>0 ? (body/range)*100 : 0;

    let bullish=0, bearish=0;

    if(ema9>ema21 && ema21>ema50) bullish++; else bearish++;
    if(rr>55) bullish++; else if(rr<45) bearish++;
    if(mm>0) bullish++; else bearish++;
    if(st>55) bullish++; else if(st<45) bearish++;
    if(wr>-50) bullish++; else bearish++;
    if(close>open && candlePower>45) bullish++; else if(close<open && candlePower>45) bearish++;

    let confidence=Math.round((Math.max(bullish,bearish)/6)*100);
    let buyers=Math.round((bullish/6)*100);
    let sellers=Math.round((bearish/6)*100);

    let signal="WAIT", cls="wait", strength="WEAK / WAIT";

    if(bullish>=5){
      signal="CALL / BUY ↑";
      cls="buy";
      strength=confidence>=80 ? "STRONG SIGNAL" : "BUY SIGNAL";
    }else if(bearish>=5){
      signal="PUT / SELL ↓";
      cls="sell";
      strength=confidence>=80 ? "STRONG SIGNAL" : "SELL SIGNAL";
    }


document.getElementById("signal").innerHTML=signal;
    document.getElementById("signal").className="signal "+cls;
    document.getElementById("strength").innerHTML=strength;
    document.getElementById("confidence").innerHTML=confidence+"%";
    document.getElementById("price").innerHTML="Price: "+last.toFixed(5);

    document.getElementById("buyers").innerHTML=buyers+"%";
    document.getElementById("sellers").innerHTML=sellers+"%";
    document.getElementById("buyBar").style.width=buyers+"%";
    document.getElementById("sellBar").style.width=sellers+"%";

    document.getElementById("mood").innerHTML = bullish>bearish ? "BULLISH" : bearish>bullish ? "BEARISH" : "WAIT";
    document.getElementById("mood").className = "mood "+cls;
    document.getElementById("control").innerHTML = bullish>bearish ? "Buyers in Control" : bearish>bullish ? "Sellers in Control" : "Sideways Market";

    document.getElementById("emaBox").innerHTML = ema9>ema21 ? "Bullish" : "Bearish";
    document.getElementById("rsiBox").innerHTML = rr.toFixed(2);
    document.getElementById("macdBox").innerHTML = mm.toFixed(5);
    document.getElementById("stochBox").innerHTML = st.toFixed(2);
    document.getElementById("willBox").innerHTML = wr.toFixed(2);
    document.getElementById("candleBox").innerHTML = Math.round(candlePower)+"%";
    document.getElementById("summary").innerHTML = Math.max(bullish,bearish)+" / 6";
    document.getElementById("update").innerHTML = new Date().toLocaleTimeString();

    drawChart(closes.slice(-40));

  }catch(err){
    document.getElementById("signal").innerHTML="ERROR";
    alert(err.message);
  }
}

function clock(){
  document.getElementById("time").innerHTML=new Date().toLocaleTimeString();
}
setInterval(clock,1000);
clock();
scan();
setInterval(scan,60000);
</script>

</body>
</html>
