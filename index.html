<!DOCTYPE html>
<html>
<head>
<title>Quotex Real Scanner V2</title>
<style>
body{background:#07172a;color:white;font-family:Arial;text-align:center;padding:30px}
.card{background:#1e293b;padding:25px;border-radius:18px;max-width:520px;margin:auto}
.signal{font-size:38px;font-weight:bold}
.buy{color:#00ff66}
.sell{color:#ff4444}
.wait{color:#ffd700}
.small{color:#cbd5e1;font-size:14px}
button{padding:12px 28px;font-size:18px;border-radius:10px;border:0;cursor:pointer}
</style>
</head>
<body>

<div class="card">
<h1>QUOTEX REAL SCANNER V2</h1>
<h2>EUR/USD - 1 Minute</h2>
<div id="signal" class="signal wait">WAIT</div>
<p id="price">Price: --</p>
<p id="info" class="small">EMA + RSI + MACD real scan</p>
<button onclick="scan()">SCAN NOW</button>
<p class="small">Auto scan every 60 seconds</p>
</div>

<script>
const API_KEY = "c48c777c933744a8a07e31491abffec3";

function ema(values, period){
  var k = 2 / (period + 1);
  var e = values[0];
  for(var i=1; i<values.length; i++){
    e = values[i] * k + e * (1-k);
  }
  return e;
}

function rsi(values, period){
  var gains = 0;
  var losses = 0;
  for(var i=values.length-period; i<values.length; i++){
    var diff = values[i] - values[i-1];
    if(diff >= 0){ gains += diff; }
    else{ losses -= diff; }
  }
  if(losses === 0){ return 100; }
  var rs = gains / losses;
  return 100 - (100 / (1 + rs));
}

function macd(values){
  var fast = ema(values.slice(-26), 12);
  var slow = ema(values.slice(-26), 26);
  return fast - slow;
}

async function scan(){
  var signalEl = document.getElementById("signal");
  var infoEl = document.getElementById("info");
  var priceEl = document.getElementById("price");

  signalEl.innerHTML = "SCANNING...";
  signalEl.className = "signal wait";

  try{
    var url = "https://api.twelvedata.com/time_series?symbol=EUR/USD&interval=1min&outputsize=80&apikey=" + API_KEY;

    var res = await fetch(url);
    var data = await res.json();

    if(data.status === "error" || !data.values){
      signalEl.innerHTML = "API ERROR";
      infoEl.innerHTML = data.message || "Check API key or limit";
      return;
    }

    var candles = data.values.reverse();
    var closes = candles.map(function(c){ return parseFloat(c.close); });

    var last = closes[closes.length - 1];
    var ema9 = ema(closes.slice(-30), 9);
    var ema21 = ema(closes.slice(-40), 21);
    var ema50 = ema(closes.slice(-60), 50);
    var rr = rsi(closes, 14);
    var mm = macd(closes);

    priceEl.innerHTML = "Price: " + last.toFixed(5);

    var call = last > ema50 && ema9 > ema21 && rr > 52 && rr < 70 && mm > 0;
    var put = last < ema50 && ema9 < ema21 && rr < 48 && rr > 30 && mm < 0;

    if(call){
      signalEl.innerHTML = "CALL / BUY";
      signalEl.className = "signal buy";
    }else if(put){
      signalEl.innerHTML = "PUT / SELL";
      signalEl.className = "signal sell";
    }else{
      signalEl.innerHTML = "WAIT";
      signalEl.className = "signal wait";
    }

    infoEl.innerHTML =
      "EMA9: " + ema9.toFixed(5) +
      " | EMA21: " + ema21.toFixed(5) +
      " | EMA50: " + ema50.toFixed(5) +
      "<br>RSI: " + rr.toFixed(2) +
      " | MACD: " + mm.toFixed(5);

  }catch(err){
    signalEl.innerHTML = "ERROR";
    infoEl.innerHTML = err.message;
  }
}

scan();
setInterval(scan, 60000);
</script>

</body>
</html>
