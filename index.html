<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quotex Scanner V3 Real</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#050814;color:white;font-family:Arial;padding:12px}
.header,.card{background:#0b1224;border:1px solid #1e40af;border-radius:18px;padding:14px;margin-bottom:12px}
.header{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:22px;font-weight:bold}.green{color:#00ff66}.red{color:#ff4444}.yellow{color:#ffd43b}
.live{border:1px solid #00ff66;border-radius:20px;padding:7px 12px;color:#00ff66}
canvas{width:100%;height:330px;background:#08101f;border-radius:16px}
.signal{font-size:32px;font-weight:bold;text-align:center;padding:18px;border-radius:18px;margin:12px 0}
.buy{background:#064d28;color:#00ff66}.sell{background:#4d0505;color:#ff4444}.wait{background:#4a3b05;color:#ffd43b}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.box{background:#111b34;border-radius:14px;padding:12px;text-align:center}
.big{font-size:30px;font-weight:bold}.small{font-size:13px;color:#aab6d3}
.err{color:#ff7777;font-weight:bold}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Quotex Scanner <span class="green">V3 Real</span></div>
  <div class="live">REAL API</div>
</div>

<canvas id="chart" width="900" height="330"></canvas>

<div id="signalBox" class="signal wait">🟡 LOADING REAL DATA...</div>

<div class="grid">
  <div class="box"><div class="small">Candle Timer</div><div id="timer" class="big yellow">--</div></div>
  <div class="box"><div class="small">Next Candle</div><div id="next" class="big">WAIT</div></div>
  <div class="box"><div class="small">Confidence</div><div id="conf" class="big yellow">0%</div></div>
  <div class="box"><div class="small">Buyers / Sellers</div><div class="big"><span id="buyers" class="green">50%</span> / <span id="sellers" class="red">50%</span></div></div>
</div>

<div class="card">
  Pair: <b>EUR/USD Real Market</b><br>
  Pattern: <b id="pattern">Scanning</b><br>
  Market: <b id="market">Scanning</b><br>
  Last Update: <b id="time">--</b><br>
  API Status: <b id="apiStatus">Checking...</b>
</div>

<script>
const API_KEY =
  "c48c777c933744a8a07e31491abffec3";
const SYMBOL = "EUR/USD";
const INTERVAL = "1min";

let candles = [];
let lastSignal = "WAIT";

async function fetchCandles(){
  const statusEl = document.getElementById("apiStatus");

  if(API_KEY === "YOUR_API_KEY_HERE" || API_KEY.length < 10){
    showError("API KEY ADD PANNA DA");
    statusEl.innerText = "API key missing";
    return;
  }

  try{
    const url = "https://api.twelvedata.com/time_series?symbol=" +
      encodeURIComponent(SYMBOL) +
      "&interval=" + INTERVAL +
      "&outputsize=60&apikey=" + API_KEY;

    const res = await fetch(url);
    const data = await res.json();

    console.log("TwelveData Response:", data);

    if(data.status === "error" || !data.values){
      let msg = data.message ? data.message : "No candle data";
      showError("API ERROR: " + msg);
      statusEl.innerText = msg;
      return;
    }

    candles = data.values.reverse().map(v => ({
      time: v.datetime,
      open: Number(v.open),
      high: Number(v.high),
      low: Number(v.low),
      close: Number(v.close)
    }));

    statusEl.innerText = "Connected";
    analyzeAndDraw();

  }catch(err){
    console.error(err);
    showError("NETWORK ERROR / API BLOCK");
    statusEl.innerText = "Network error";
  }
}

function showError(msg){
  const box = document.getElementById("signalBox");
  box.className = "signal wait";
  box.innerText = "🟡 " + msg;
}

function ema(arr,len){
  let k = 2 / (len + 1);
  let e = arr[0];
  for(let i=1;i<arr.length;i++){
    e = arr[i] * k + e * (1 - k);
  }
  return e;
}

function rsi(closes,len){
  let gain = 0;
  let loss = 0;
  for(let i = closes.length - len; i < closes.length; i++){
    let d = closes[i] - closes[i-1];
    if(d > 0) gain += d;
    else loss -= d;
  }
  if(loss === 0) return 100;
  return 100 - (100 / (1 + gain / loss));
}
